name: Live provider compatibility

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 2"

jobs:
  live:
    strategy:
      fail-fast: false
      matrix:
        provider: [e2b, daytona, vercel, upstash, blaxel]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun packages/sdk/scripts/run-live.ts ${{ matrix.provider }}
        env:
          E2B_API_KEY: ${{ matrix.provider == 'e2b' && secrets.E2B_API_KEY || '' }}
          DAYTONA_API_KEY: ${{ matrix.provider == 'daytona' && secrets.DAYTONA_API_KEY || '' }}
          DAYTONA_API_URL: ${{ matrix.provider == 'daytona' && secrets.DAYTONA_API_URL || '' }}
          VERCEL_TOKEN: ${{ matrix.provider == 'vercel' && secrets.VERCEL_TOKEN || '' }}
          VERCEL_TEAM_ID: ${{ matrix.provider == 'vercel' && secrets.VERCEL_TEAM_ID || '' }}
          VERCEL_PROJECT_ID: ${{ matrix.provider == 'vercel' && secrets.VERCEL_PROJECT_ID || '' }}
          UPSTASH_BOX_API_KEY: ${{ matrix.provider == 'upstash' && secrets.UPSTASH_BOX_API_KEY || '' }}
          BL_API_KEY: ${{ matrix.provider == 'blaxel' && secrets.BL_API_KEY || '' }}
          BL_WORKSPACE: ${{ matrix.provider == 'blaxel' && secrets.BL_WORKSPACE || '' }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0 # v7.0.1
        if: always()
        with:
          name: compatibility-${{ matrix.provider }}
          path: packages/sdk/compatibility/results/${{ matrix.provider }}.json
